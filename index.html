<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Just Julie</title>
  <style>
    /* Your styles here */
  </style>
</head>
<body>

  <!-- Sticky Ribbon -->
  <div class="ribbon">TEXTHERE</div>

  <!-- Placeholder for the Navbar -->
  <div id="navbar-container"></div>

  <!-- Content below -->
  <div class="section-label">
    <h1>Welcome to Just Julie</h1>
    <p>This is the main landing page. Please choose a section above.</p>
  </div>

  <script>
    // Function to load navbar dynamically
    function loadNavbar() {
      const navbarContainer = document.getElementById('navbar-container');
      fetch('navbar.html')
        .then(response => response.text())
        .then(data => {
          navbarContainer.innerHTML = data;
        })
        .catch(err => {
          console.log('Error loading navbar:', err);
        });
    }

    // Load navbar when the page loads
    window.onload = loadNavbar;
  </script>

</body>
</html>
