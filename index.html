<!-- Declares the document type as HTML5 -->
<!DOCTYPE html>

<!-- Sets the language of the document to English -->
<html lang="en">

<head>
  <!-- Specifies the character encoding for the webpage -->
  <meta charset="UTF-8" />

  <!-- Makes the page responsive by setting the viewport to the device's width -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Title that appears in the browser tab -->
  <title>My Portfolio</title>

  <!-- Link to an external CSS stylesheet for styling the webpage -->
  <link rel="stylesheet" href="style.css" />
</head>

<!-- Body tag contains everything that will be visible on the webpage -->
<body>

  <!-- Header section at the top of the page, typically used for branding and navigation -->
  <header>
    <!-- Main title of the portfolio site -->
    <h1>My Portfolio</h1>

    <!-- Navigation menu that lets users switch between sections -->
    <nav>
      <ul>
        <!-- Link to the Professional portfolio page -->
        <li><a href="professional.html">Professional</a></li>

        <!-- Link to the Creative portfolio page -->
        <li><a href="creative.html">Creative</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main content area of the homepage -->
  <main>
    <!-- Welcome message (sub-heading) -->
    <h2>Welcome!</h2>

    <!-- Instructions or prompt for the user -->
    <p>Select a tab to view my work.</p>
  </main>

  <!-- Footer section at the bottom of the page -->
  <footer>
    <!-- Copyright notice -->
    <p>&copy; 2025 Your Name</p>
  </footer>

</body>
</html>
