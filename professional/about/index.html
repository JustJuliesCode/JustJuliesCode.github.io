<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>About - Just Julie</title>
  <style>
    /* Your styles here */
  </style>
</head>
<body>

  <!-- Sticky Ribbon -->
  <div class="ribbon">TEXTHERE</div>

  <!-- Placeholder for the Navbar -->
  <div id="navbar-container"></div>

  <!-- Content for About Page -->
  <div class="section-label">
    <h1>About Just Julie</h1>
    <p>This is the about page. Learn more about Julie.</p>
  </div>

  <script>
    // Load navbar when the page loads
    window.onload = function() {
      loadNavbar();
    };

    // Function to load navbar dynamically
    function loadNavbar() {
      const navbarContainer = document.getElementById('navbar-container');
      fetch('navbar.html')
        .then(response => response.text())
        .then(data => {
          navbarContainer.innerHTML = data;
        })
        .catch(err => {
          console.log('Error loading navbar:', err);
        });
    }
  </script>

</body>
</html>
